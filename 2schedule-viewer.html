<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F4F0">
<title>Schedule Viewer</title>
<script>
// 달력 아이콘 SVG → canvas → PNG data URI → apple-touch-icon 동적 생성
(function(){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
    <!-- 배경 -->
    <rect width="180" height="180" rx="38" fill="#F5F4F0"/>
    <!-- 달력 몸체 -->
    <rect x="22" y="44" width="136" height="114" rx="14" fill="#FFFFFF" stroke="#E8E6E1" stroke-width="3"/>
    <!-- 상단 헤더 바 -->
    <rect x="22" y="44" width="136" height="38" rx="14" fill="#4A7C59"/>
    <rect x="22" y="64" width="136" height="18" fill="#4A7C59"/>
    <!-- 링 왼쪽 -->
    <rect x="56" y="28" width="12" height="32" rx="6" fill="#2C5F3F"/>
    <!-- 링 오른쪽 -->
    <rect x="112" y="28" width="12" height="32" rx="6" fill="#2C5F3F"/>
    <!-- 날짜 점들 -->
    <rect x="36"  y="100" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="58"  y="100" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="80"  y="100" width="14" height="10" rx="3" fill="#4A7C59"/>
    <rect x="102" y="100" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="124" y="100" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="36"  y="120" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="58"  y="120" width="14" height="10" rx="3" fill="#4A6FA5"/>
    <rect x="80"  y="120" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="102" y="120" width="14" height="10" rx="3" fill="#4A6FA5"/>
    <rect x="124" y="120" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="36"  y="140" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="58"  y="140" width="14" height="10" rx="3" fill="#E8E6E1"/>
    <rect x="80"  y="140" width="14" height="10" rx="3" fill="#C4622D"/>
    <rect x="102" y="140" width="14" height="10" rx="3" fill="#E8E6E1"/>
  </svg>`;

  const canvas = document.createElement('canvas');
  canvas.width = 180; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function(){
    ctx.drawImage(img, 0, 0, 180, 180);
    URL.revokeObjectURL(url);
    const png = canvas.toDataURL('image/png');
    // apple-touch-icon
    const link1 = document.createElement('link');
    link1.rel = 'apple-touch-icon'; link1.href = png;
    document.head.appendChild(link1);
    // favicon
    const link2 = document.createElement('link');
    link2.rel = 'icon'; link2.type = 'image/png'; link2.href = png;
    document.head.appendChild(link2);
  };
  img.src = url;
})();
</script>
<style>
  /* ── 팔레트 ──────────────────────────────────────
     배경   : #F5F4F0  따뜻한 오프화이트
     카드   : #FFFFFF
     테두리 : #E8E6E1  베이지 그레이
     텍스트 : #2C2B28  진한 워밍 다크
     서브   : #8A877E  따뜻한 미드 그레이

     지호 A : 세이지 그린  #4A7C59 / #EBF2ED
     지호 C : 스틸 블루    #4A6FA5 / #E8EEF7
     새은 오픈: 세이지 그린 (같은 계열)
     새은 미들: 더스티 골드  #9A7B2F / #F5EED8
     새은 마감: 스틸 블루 (같은 계열)
     OFF    : 로즈 그레이  #B05252 / #F5EBEB
     공동휴무: 번트 오렌지  #C4622D (진하게)
     지호메모: 더스티 라벤더 #7B6FAF / #F0EEF8
     새은메모: 더스티 로즈  #B06070 / #F5ECEE
  ────────────────────────────────────────────── */
  :root {
    --bg:       #F5F4F0;
    --card:     #FFFFFF;
    --border:   #E8E6E1;
    --text:     #2C2B28;
    --sub:      #8A877E;
    --divider:  #EFEDE8;

    --today-bg:     #FFFDF5;
    --today-border: #D4A843;
    --today-num:    #B8892A;

    --sj-a-bg:   #EBF2ED; --sj-a-accent: #4A7C59;
    --sj-c-bg:   #E8EEF7; --sj-c-accent: #4A6FA5;

    --bs-open-bg: #EBF2ED; --bs-open-accent: #4A7C59;
    --bs-mid-bg:  #F5EED8; --bs-mid-accent:  #9A7B2F;
    --bs-close-bg:#E8EEF7; --bs-close-accent:#4A6FA5;

    --off-bg:   #F5EBEB; --off-text: #B05252;
    --bs-accent:#B06070;

    --sj-memo-bg: #F0EEF8; --sj-memo-accent: #7B6FAF;
    --bs-memo-bg: #F5ECEE; --bs-memo-accent: #B06070;

    --shared-bg:   #C4622D; --shared-text: #fff;
    --holiday:  #C0412E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ───────────────────────────────────── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 12px 8px;
    position: sticky; top: 0; z-index: 20;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 7px;
  }
  .title {
    font-size: 14px; font-weight: 800; letter-spacing: -.3px;
    color: var(--text);
  }
  .title span { color: #111111; }

  /* 월 이동 */
  .month-nav { display: flex; align-items: center; gap: 5px; }
  .nav-btn {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--bg); border: 1px solid var(--border);
    font-size: 14px; cursor: pointer; color: var(--sub);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .nav-btn:hover { background: var(--divider); color: var(--text); }
  .month-label {
    font-size: 13px; font-weight: 700; min-width: 72px; text-align: center;
    color: var(--text);
  }

  /* 레전드 */
  .legend {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: var(--sub); }
  .legend-dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-sj      { background: var(--sj-a-accent); }
  .dot-bs      { background: var(--bs-accent); }
  .dot-memo-sj { background: var(--sj-memo-accent); }
  .dot-memo-bs { background: var(--bs-memo-accent); }

  /* 시프트 범례 pills */
  .shift-legend {
    display: flex; gap: 4px; flex-wrap: wrap;
    padding-top: 7px; border-top: 1px solid var(--divider);
  }
  .shift-pill {
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
    letter-spacing: -.1px;
  }
  .pill-off { background: var(--off-bg); color: var(--off-text); }

  /* ── Calendar ─────────────────────────────────── */
  .calendar { padding: 8px 6px 20px; }

  .week-header {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px; margin-bottom: 3px;
  }
  .week-day {
    text-align: center; font-size: clamp(9px, 2vw, 11px); font-weight: 700;
    color: var(--sub); padding: 3px 0; letter-spacing: .02em;
  }
  .week-day.sat { color: #5A7AC4; }
  .week-day.sun { color: var(--off-text); }

  .weeks { display: flex; flex-direction: column; gap: 2px; }
  .week  { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

  .day-cell {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: clamp(3px, 1.2vw, 7px) clamp(2px, 1vw, 6px) clamp(2px, 0.8vw, 5px);
    min-height: clamp(80px, 20vw, 130px);
    cursor: pointer;
    transition: box-shadow .2s;
    overflow: hidden;
  }
  .day-cell:hover { box-shadow: 0 2px 8px rgba(44,43,40,.08); }
  .day-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .day-cell.today {
    background: var(--today-bg);
    border: 1.5px solid var(--today-border);
    box-shadow: 0 0 0 2px rgba(212,168,67,.12);
  }
  .day-cell.today .day-num-text { color: var(--today-num); }
  .day-cell.past { opacity: .38; }

  .day-num {
    display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
    margin-bottom: 3px;
  }
  .day-num-text {
    font-size: clamp(10px, 2.8vw, 13px); font-weight: 800; color: var(--text);
    line-height: 1;
  }
  .day-num.sat .day-num-text { color: #5A7AC4; }
  .day-num.sun .day-num-text { color: var(--off-text); }
  .day-num.holiday .day-num-text { color: var(--holiday); }

  .today-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--today-border); flex-shrink: 0;
  }
  .holiday-name {
    font-size: clamp(6px, 1.6vw, 8px); font-weight: 700; color: var(--holiday);
    line-height: 1.2; width: 100%; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Schedule blocks ──────────────────────────── */
  .sched-block {
    border-radius: 4px;
    padding: clamp(2px, 0.6vw, 3px) clamp(2px, 1vw, 5px);
    margin-bottom: 2px;
    font-size: clamp(8px, 2.2vw, 10px);
    line-height: 1.3;
    overflow: hidden;
  }
  .block-sj-a   { background: var(--sj-a-bg);    border-left: 2px solid var(--sj-a-accent);    color: var(--sj-a-accent); }
  .block-sj-c   { background: var(--sj-c-bg);    border-left: 2px solid var(--sj-c-accent);    color: var(--sj-c-accent); }
  .block-bs-open  { background: var(--bs-open-bg);  border-left: 2px solid var(--bs-open-accent);  color: var(--bs-open-accent); }
  .block-bs-mid   { background: var(--bs-mid-bg);   border-left: 2px solid var(--bs-mid-accent);   color: var(--bs-mid-accent); }
  .block-bs-close { background: var(--bs-close-bg); border-left: 2px solid var(--bs-close-accent); color: var(--bs-close-accent); }
  .block-rest-sj, .block-rest-bs {
    background: var(--off-bg);
    border-left: 2px solid var(--off-text);
    color: var(--off-text);
  }

  .staff-name  { font-weight: 700; font-size: clamp(7px, 1.8vw, 9px); opacity: .75; }
  .shift-label { font-weight: 700; font-size: clamp(8px, 2.2vw, 10px); }
  .shift-time  { font-size: clamp(7px, 2vw, 10px); font-weight: 600; opacity: .85;
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

  /* 공동 휴무 */
  .shared-off-badge {
    display: inline-flex; align-items: center;
    font-size: clamp(6px, 1.6vw, 8px); font-weight: 700;
    background: var(--shared-bg); color: var(--shared-text);
    border-radius: 3px; padding: 1px 4px; margin-top: 2px;
    white-space: nowrap;
  }

  /* ── Memo blocks ──────────────────────────────── */
  .memo-block {
    border-radius: 4px;
    padding: clamp(2px, 0.6vw, 3px) clamp(2px, 1vw, 5px);
    margin-bottom: 2px;
    font-size: clamp(8px, 2vw, 10px);
    line-height: 1.3;
    display: flex; align-items: flex-start; gap: 2px;
    overflow: hidden;
  }
  .memo-sj { background: var(--sj-memo-bg); border-left: 2px solid var(--sj-memo-accent); color: var(--sj-memo-accent); }
  .memo-bs { background: var(--bs-memo-bg); border-left: 2px solid var(--bs-memo-accent); color: var(--bs-memo-accent); }
  .memo-text { flex: 1; word-break: break-all; font-weight: 500;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .memo-del  { font-size: 9px; opacity: .35; cursor: pointer; flex-shrink: 0; line-height: 1.5; transition: opacity .15s; }
  .memo-del:hover { opacity: 1; }

  /* + 버튼 */
  .add-memo-btn {
    width: 100%; text-align: center; font-size: 13px;
    color: var(--border); margin-top: 1px; line-height: 1;
    cursor: pointer; display: block; transition: color .15s;
  }
  .add-memo-btn:hover { color: var(--sj-memo-accent); }
  .no-sched { font-size: 9px; color: var(--border); text-align: center; padding-top: 6px; }

  /* ── Modal ────────────────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(44,43,40,.4); z-index: 100;
    align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card); border-radius: 20px;
    width: 90%; max-width: 360px;
    box-shadow: 0 20px 60px rgba(44,43,40,.18);
    animation: pop .18s ease; overflow: hidden;
    border: 1px solid var(--border);
  }
  @keyframes pop { from { transform: scale(.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* 탭 */
  .modal-tabs {
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .modal-tab {
    flex: 1; padding: 12px 0; font-size: 12px; font-weight: 700;
    text-align: center; cursor: pointer; color: var(--sub);
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    letter-spacing: -.1px;
  }
  .modal-tab.active { color: var(--sj-memo-accent); border-bottom-color: var(--sj-memo-accent); background: var(--card); }

  .modal-body { padding: 18px 18px 16px; }
  .modal-title {
    font-size: 14px; font-weight: 800; margin-bottom: 14px;
    color: var(--text); letter-spacing: -.2px;
  }

  /* 일정 탭 */
  .modal-field { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .field-label { font-size: 12px; font-weight: 800; min-width: 28px; text-align: right; flex-shrink: 0; }
  .field-sj { color: var(--sj-memo-accent); }
  .field-bs { color: var(--bs-memo-accent); }
  .modal-field input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 9px 12px; font-size: 13px; font-family: inherit;
    outline: none; background: var(--bg);
    transition: border-color .15s, background .15s;
    color: var(--text);
  }
  .modal-field input:focus { border-color: var(--sj-memo-accent); background: #fff; }

  /* 편집 탭 */
  .edit-section { margin-bottom: 14px; }
  .edit-section-title {
    font-size: 10px; font-weight: 700; color: var(--sub);
    margin-bottom: 8px; letter-spacing: .06em; text-transform: uppercase;
  }
  .edit-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
    cursor: pointer; border: 1.5px solid transparent;
    transition: all .15s; opacity: .55;
  }
  .chip:hover { opacity: .85; }
  .chip.selected { opacity: 1; border-color: currentColor; }
  .chip-sj-a    { background: var(--sj-a-bg);    color: var(--sj-a-accent); }
  .chip-sj-c    { background: var(--sj-c-bg);    color: var(--sj-c-accent); }
  .chip-off     { background: var(--off-bg);      color: var(--off-text); }
  .chip-none    { background: var(--divider);     color: var(--sub); }
  .chip-bs-open { background: var(--bs-open-bg);  color: var(--bs-open-accent); }
  .chip-bs-mid  { background: var(--bs-mid-bg);   color: var(--bs-mid-accent); }
  .chip-bs-close{ background: var(--bs-close-bg); color: var(--bs-close-accent); }
  .chip-bs-off  { background: var(--off-bg);      color: var(--off-text); }
  .chip-bs-blank{ background: var(--divider);     color: var(--sub); }

  .modal-divider { height: 1px; background: var(--divider); margin: 12px 0; }

  /* 버튼 */
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn {
    flex: 1; padding: 11px; border-radius: 12px;
    border: none; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity .15s, transform .1s;
    letter-spacing: -.1px;
  }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.97); }
  .btn-cancel { background: var(--bg); color: var(--sub); border: 1px solid var(--border); }
  .btn-save   { background: var(--sj-memo-accent); color: #fff; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── 공유 메모장 ─────────────────────────────────── */
  .chatboard {
    margin: 0 10px 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .chat-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .chat-refresh {
    background: none; border: none; font-size: 16px;
    color: var(--sub); cursor: pointer; padding: 2px 6px;
    border-radius: 6px; transition: background .15s;
  }
  .chat-refresh:hover { background: var(--divider); }

  .chat-messages {
    min-height: 120px; max-height: 260px;
    overflow-y: auto; padding: 12px 12px 6px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .chat-date-divider {
    text-align: center; font-size: 10px; font-weight: 700;
    color: var(--sub); margin: 2px 0 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .chat-date-divider::before, .chat-date-divider::after {
    content:''; flex:1; height:1px; background: var(--border);
  }
  .chat-empty {
    text-align: center; font-size: 12px; color: var(--sub);
    padding: 20px 0;
  }
  .chat-msg {
    display: flex; flex-direction: column; gap: 2px;
    position: relative; max-width: 82%;
  }
  .msg-sj { align-self: flex-start; }
  .msg-bs { align-self: flex-end; align-items: flex-end; }

  .chat-who { font-size: 10px; font-weight: 700; color: var(--sub); padding: 0 4px; }
  .chat-bubble {
    font-size: 13px; font-weight: 500;
    padding: 8px 12px; border-radius: 14px;
    line-height: 1.45; word-break: break-all;
    display: flex; flex-direction: column; gap: 3px;
  }
  .bubble-text { line-height: 1.45; }
  .bubble-time {
    font-size: 9px; opacity: .6; font-weight: 400;
    align-self: flex-end;
  }
  .msg-sj .chat-bubble {
    background: var(--sj-memo-bg); color: var(--sj-memo-accent);
    border-bottom-left-radius: 4px;
  }
  .msg-bs .chat-bubble {
    background: var(--bs-memo-bg); color: var(--bs-memo-accent);
    border-bottom-right-radius: 4px;
  }
  .chat-del {
    position: absolute; top: 18px;
    font-size: 9px; color: var(--sub); opacity: 0;
    cursor: pointer; transition: opacity .15s;
  }
  .msg-sj .chat-del { right: -16px; }
  .msg-bs .chat-del { left: -16px; }
  .chat-msg:hover .chat-del { opacity: 1; }

  .chat-inputs {
    border-top: 1px solid var(--border);
    padding: 10px 12px 12px;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--bg);
  }
  .chat-input-row {
    display: flex; align-items: center; gap: 7px;
  }
  .chat-label {
    font-size: 11px; font-weight: 700;
    min-width: 28px; text-align: right; flex-shrink: 0;
  }
  .chat-label-sj { color: var(--sj-memo-accent); }
  .chat-label-bs { color: var(--bs-memo-accent); }
  .chat-input-row input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 20px;
    padding: 7px 12px; font-size: 13px; font-family: inherit;
    outline: none; background: var(--card); color: var(--text);
    transition: border-color .15s;
  }
  .chat-input-row input:focus { border-color: var(--sj-memo-accent); }
  .chat-send {
    padding: 7px 13px; border-radius: 20px;
    background: var(--sj-memo-accent); color: #fff;
    border: none; font-size: 12px; font-weight: 700;
    cursor: pointer; flex-shrink: 0; transition: opacity .15s;
  }
  .chat-send:hover { opacity: .85; }

  @media (max-width: 430px) {
    .chatboard { margin: 0 6px 24px; border-radius: 10px; }
    .chat-bubble { font-size: 12px; padding: 7px 10px; }
    .chat-input-row input { font-size: 12px; padding: 6px 10px; }

  /* 일반 모바일 세로 (360px ~ 430px — 갤럭시·픽셀·아이폰 대부분) */
  @media (max-width: 430px) {
    .header { padding: 8px 10px 7px; }
    .header-top { margin-bottom: 6px; }
    .title { font-size: 13px; }
    .month-label { font-size: 12px; min-width: 66px; }

    .legend { gap: 6px; margin-bottom: 5px; }

    .calendar { padding: 5px 4px 16px; }
    .week-header { gap: 2px; margin-bottom: 2px; }
    .week-day { font-size: 9px; padding: 2px 0; }
    .weeks { gap: 2px; }
    .week { gap: 2px; }

    .day-cell {
      border-radius: 5px;
      padding: 3px 2px 2px;
      min-height: clamp(72px, 18.5vw, 100px);
    }
    .day-num { margin-bottom: 2px; gap: 1px; }
    .day-num-text { font-size: clamp(9px, 2.6vw, 12px); }
    .holiday-name { font-size: clamp(5.5px, 1.5vw, 7px); }
    .today-dot { width: 3px; height: 3px; }

    .sched-block {
      padding: 1px 3px;
      margin-bottom: 1px;
      border-radius: 3px;
      font-size: clamp(7px, 2vw, 9px);
      border-left-width: 1.5px;
    }
    .staff-name  { font-size: clamp(6px, 1.7vw, 8px); }
    .shift-label { font-size: clamp(7px, 2vw, 9px); }
    .shift-time  { font-size: clamp(6px, 1.8vw, 8px); }

    .memo-block {
      padding: 1px 3px; margin-bottom: 1px;
      font-size: clamp(6px, 1.8vw, 8px);
      border-left-width: 1.5px;
    }
    .shared-off-badge { font-size: clamp(5.5px, 1.5vw, 7px); padding: 1px 3px; }
    .add-memo-btn { font-size: 11px; }
    .no-sched { font-size: 8px; padding-top: 4px; }
  }

  /* 소형 모바일 (360px 이하 — 갤럭시 A 시리즈 구형 등) */
  @media (max-width: 360px) {
    .day-cell { min-height: clamp(65px, 17vw, 85px); }
    .sched-block { font-size: clamp(6px, 1.8vw, 8px); }
    .shift-time { display: none; } /* 공간 부족 시 시간 숨김 */
    .staff-name { display: none; } /* 이름 숨기고 색상으로 구분 */
  }

  /* 태블릿·가로모드 (600px 이상) */
  @media (min-width: 600px) {
    .day-cell { min-height: 120px; border-radius: 9px; padding: 7px 6px 5px; }
    .day-num-text { font-size: 13px; }
    .sched-block { font-size: 10px; padding: 3px 5px; }
    .shift-time { font-size: 11px; }
    .staff-name { font-size: 9px; }
    .header { padding: 12px 16px 10px; }
    .calendar { padding: 10px 8px 20px; }
    .week { gap: 4px; }
    .weeks { gap: 4px; }
    .week-header { gap: 4px; }
  }

  /* iOS Safari 안전 영역 (노치·홈바 대응) */
  @supports (padding: env(safe-area-inset-bottom)) {
    body { padding-bottom: env(safe-area-inset-bottom); }
    .header {
      padding-left: max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
    }
    .calendar {
      padding-left: max(4px, env(safe-area-inset-left));
      padding-right: max(4px, env(safe-area-inset-right));
    }
  }

  /* 터치 기기 — hover 효과 제거 (안드로이드 고스트 탭 방지) */
  @media (hover: none) and (pointer: coarse) {
    .day-cell:hover { box-shadow: none; transform: none; }
    .btn:hover { opacity: 1; }
    .day-cell:active { box-shadow: 0 2px 8px rgba(44,43,40,.12); }
    .btn:active { opacity: .85; transform: scale(.97); }
  }
</style>

<body>

<div class="header">
  <div class="header-top">
    <div class="title">Schedule <span>Viewer</span></div>
    <div class="month-nav">

  <div class="shift-legend">

    <span class="shift-pill" style="background:#F5EED8;color:#9A7B2F">미들</span>

<div class="calendar">

<!-- 부탁의 말씀 -->
<div class="chatboard">

  <div class="chat-messages" id="chatMessages">

      <span class="chat-label chat-label-bs">새은</span>
      <input id="chatInputBS" type="text" placeholder="메시지 입력…" autocomplete="off"/>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-tabs">
      <div class="modal-tab active" id="tabMemo">📝 개인 일정</div>
      <div class="modal-tab" id="tabEdit">✏️ 스케줄 편집</div>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>

      <!-- 일정 패널 -->
      <div class="tab-panel active" id="panelMemo">
        <div class="modal-field">
          <label class="field-label field-sj">지호</label>
          <input id="inputSJ" type="text" placeholder="지호 일정 입력…" autocomplete="off"/>
        </div>
        <div class="modal-field">
          <label class="field-label field-bs">새은</label>
          <input id="inputBS" type="text" placeholder="새은 일정 입력…" autocomplete="off"/>
        </div>
      </div>

      <!-- 편집 패널 -->
      <div class="tab-panel" id="panelEdit">
        <div class="edit-section">
          <div class="edit-section-title">지호 스케줄</div>
          <div class="edit-chips" id="chipsSJ">
            <div class="chip chip-sj-a" data-who="sj" data-val="A">08:00~19:00</div>
            <div class="chip chip-sj-c" data-who="sj" data-val="C">마감 11:00~22:00</div>
            <div class="chip chip-off"  data-who="sj" data-val="rest">OFF</div>
            <div class="chip chip-none" data-who="sj" data-val="">미정</div>
          </div>
        </div>
        <div class="modal-divider"></div>
        <div class="edit-section">
          <div class="edit-section-title">새은 스케줄</div>
          <div class="edit-chips" id="chipsBS">
            <div class="chip chip-bs-open"  data-who="bs" data-val="오픈"  data-time="09:30~14:30">오픈 09:30</div>
            <div class="chip chip-bs-open"  data-who="bs" data-val="오픈2" data-time="11:30~16:30">오픈 11:30</div>
            <div class="chip chip-bs-mid"   data-who="bs" data-val="미들"  data-time="12:00~17:00">미들</div>
            <div class="chip chip-bs-close" data-who="bs" data-val="마감"  data-time="16:00~21:00">마감</div>
            <div class="chip chip-bs-off"   data-who="bs" data-val="off">OFF</div>
            <div class="chip chip-bs-blank" data-who="bs" data-val="">미정</div>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-cancel" id="btnCancel">취소</button>
        <button class="btn btn-save"   id="btnSave">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── 기본 스케줄 ──────────────────────────────────
const DEFAULT_SCHEDULES = {
  '2026-6': {
    sj: {
      25: 'rest',
    },
    bs: {
      25: null,
    },
  },
  '2026-7': {
    sj:{1:'rest',2:'A',3:'A',4:'A',5:'A',6:'A',7:'rest',8:'C',9:'A',10:'A',11:'rest',12:'C',13:'C',14:'rest',15:'rest',16:'A',17:'A',18:'A',19:'A',20:'rest',21:'A',22:'A',23:'A',24:'rest',25:'rest',26:'C',27:'C',28:'A',29:'rest',30:'rest',31:'C'},
    bs:{1:null,2:null,3:null,4:{label:'마감',time:'16:00~21:00'},5:{label:'오픈',time:'11:30~16:30'},6:{label:'마감',time:'16:00~21:00'},7:{label:'마감',time:'16:00~21:00'},8:{label:'미들',time:'12:00~17:00'},9:null,10:null,11:{label:'마감',time:'16:00~21:00'},12:{label:'오픈',time:'11:30~16:30'},13:{label:'오픈',time:'09:30~14:30'},14:{label:'마감',time:'16:00~21:00'},15:{label:'미들',time:'12:00~17:00'},16:null,17:null,18:{label:'마감',time:'16:00~21:00'},19:{label:'오픈',time:'11:30~16:30'},20:{label:'마감',time:'16:00~21:00'}},
  },
};

const HOLIDAYS = {
  '2026-1-1' :'신정',
  '2026-2-17':'설날연휴',
  '2026-2-18':'설날',
  '2026-2-19':'설날연휴',
  '2026-3-1' :'삼일절',
  '2026-5-5' :'어린이날',
  '2026-5-24':'부처님오신날',
  '2026-6-6' :'현충일',
  '2026-7-17':'제헌절',
  '2026-8-15':'광복절',
  '2026-9-24':'추석연휴',
  '2026-9-25':'추석',
  '2026-9-26':'추석연휴',
  '2026-10-3':'개천절',
  '2026-10-9':'한글날',
  '2026-12-25':'크리스마스',
};

const shiftTime = {A:'08:00~19:00',C:'11:00~22:00'};
const weekdays  = ['월','화','수','목','금','토','일'];
const now = new Date();
let curYear = now.getFullYear(), curMonth = now.getMonth()+1;

function schedKey(y,m){ return `sched_data_${y}_${m}`; }
function memoKey(y,m) { return `sched_memo_${y}_${m}`; }
function loadSched(y,m){
  try{
    const s=JSON.parse(localStorage.getItem(schedKey(y,m)));
    // sj/bs 중 하나라도 데이터가 있을 때만 로컬 사용, 비어있으면 기본값으로
    if(s && (Object.keys(s.sj||{}).length>0 || Object.keys(s.bs||{}).length>0)) return s;
  }catch{}
  const d=DEFAULT_SCHEDULES[`${y}-${m}`];
  return d?JSON.parse(JSON.stringify(d)):{sj:{},bs:{}};
}
function _saveSched(y,m,d){ localStorage.setItem(schedKey(y,m),JSON.stringify(d)); }
function loadMemos(y,m){ try{return JSON.parse(localStorage.getItem(memoKey(y,m)))||{};}catch{return{};} }
function _saveMemos(y,m,d){ localStorage.setItem(memoKey(y,m),JSON.stringify(d)); }

function dow(y,m,d){ return (new Date(y,m-1,d).getDay()+6)%7; }
function holidayName(y,m,d){ return HOLIDAYS[`${y}-${m}-${d}`]||null; }
function isToday(y,m,d){ return now.getFullYear()===y&&now.getMonth()+1===m&&now.getDate()===d; }
function isPast(y,m,d){ return new Date(y,m-1,d)<new Date(now.getFullYear(),now.getMonth(),now.getDate()); }

function renderSJ(sj,d){
  const s=sj[d]; if(s===undefined) return '';
  if(s==='rest') return `<div class="sched-block block-rest-sj"><div class="staff-name">지호</div><div class="shift-label">OFF</div></div>`;
  const cls=s==='C'?'block-sj-c':'block-sj-a';
  const lbl=s==='C'?'<div class="shift-label">마감</div>':'';
  return `<div class="sched-block ${cls}"><div class="staff-name">지호</div>${lbl}<div class="shift-time">${shiftTime[s]}</div></div>`;
}
function renderBS(bs,d){
  if(!(d in bs)) return ''; const s=bs[d];
  if(s===null) return `<div class="sched-block block-rest-bs"><div class="staff-name">새은</div><div class="shift-label">OFF</div></div>`;
  const cm={'오픈':'block-bs-open','미들':'block-bs-mid','마감':'block-bs-close'};
  return `<div class="sched-block ${cm[s.label]}"><div class="staff-name">새은</div><div class="shift-label">${s.label}</div><div class="shift-time">${s.time}</div></div>`;
}
function renderMemos(memos,d){
  const e=memos[d]||{}; let h='';
  (e.sj||[]).forEach((t,i)=>{ h+=`<div class="memo-block memo-sj"><span class="memo-text"><b style="font-size:9px">지호</b> ${t}</span><span class="memo-del" data-day="${d}" data-who="sj" data-idx="${i}">✕</span></div>`; });
  (e.bs||[]).forEach((t,i)=>{ h+=`<div class="memo-block memo-bs"><span class="memo-text"><b style="font-size:9px">새은</b> ${t}</span><span class="memo-del" data-day="${d}" data-who="bs" data-idx="${i}">✕</span></div>`; });
  return h;
}

function buildCalendar(y,m){
  document.getElementById('monthLabel').textContent=`${y}년 ${m}월`;
  const sched=loadSched(y,m), memos=loadMemos(y,m);
  const firstDay=(new Date(y,m-1,1).getDay()+6)%7, days=new Date(y,m,0).getDate();
  let html='',week='',count=0;

  for(let i=0;i<firstDay;i++){week+=`<div class="day-cell empty"></div>`;count++;}
  for(let d=1;d<=days;d++){
    const w=dow(y,m,d);
    const dc=w===6?'sun':w===5?'sat':'';
    const tc=isToday(y,m,d)?' today':''; const pc=isPast(y,m,d)?' past':'';
    const td=isToday(y,m,d)?'<span class="today-dot"></span>':'';
    const hn=holidayName(y,m,d);
    const ht=hn?`<span class="holiday-name">${hn}</span>`:'';
    const hc=hn?' holiday':'';
    const sjB=renderSJ(sched.sj,d), bsB=renderBS(sched.bs,d);
    const sjOff=sched.sj[d]==='rest', bsOff=(d in sched.bs)&&sched.bs[d]===null;
    const shared=(sjOff&&bsOff)?`<div class="shared-off-badge">✦ 공동 휴무</div>`:'';
    const memoB=renderMemos(memos,d);
    const noS=!sjB&&!bsB&&!memoB?`<div class="no-sched">—</div>`:'';
    week+=`<div class="day-cell${tc}${pc}" data-day="${d}"><div class="day-num ${dc}${hc}"><span class="day-num-text">${d}</span>${td}${ht}</div>${sjB}${bsB}${shared}${memoB}${noS}<span class="add-memo-btn" data-day="${d}">+</span></div>`;
    count++;
    if(count%7===0){html+=`<div class="week">${week}</div>`;week='';}
  }
  if(week){while(count%7!==0){week+=`<div class="day-cell empty"></div>`;count++;}html+=`<div class="week">${week}</div>`;}
  document.getElementById('calendar').innerHTML=html;
  attachEvents(y,m);
}

let activeDay=null,activeY=null,activeM=null,pendingSJ=null,pendingBS=null;
const overlay=document.getElementById('modalOverlay');
const inputSJ=document.getElementById('inputSJ'),inputBS=document.getElementById('inputBS');

document.getElementById('tabMemo').addEventListener('click',()=>switchTab('memo'));
document.getElementById('tabEdit').addEventListener('click',()=>switchTab('edit'));
function switchTab(t){
  ['memo','edit'].forEach(x=>{
    document.getElementById('tab'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active',x===t);
    document.getElementById('panel'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active',x===t);
  });
}

function openModal(y,m,d){
  activeY=y;activeM=m;activeDay=d;
  const w=dow(y,m,d),hn=holidayName(y,m,d);
  document.getElementById('modalTitle').textContent=`${y}년 ${m}월 ${d}일 (${weekdays[w]})${hn?' · '+hn:''}`;
  inputSJ.value='';inputBS.value='';
  const sched=loadSched(y,m);
  const curSJ=sched.sj[d];
  pendingSJ=curSJ!==undefined?curSJ:'__unchanged__';
  const bsVal=!(d in sched.bs)?'__none__':sched.bs[d]===null?'off':sched.bs[d]?.time==='09:30~14:30'?'오픈':sched.bs[d]?.label==='오픈'?'오픈2':sched.bs[d]?.label||'';
  pendingBS=bsVal==='__none__'?'__unchanged__':bsVal;
  highlightChip('sj',curSJ===undefined?'__none__':curSJ);
  highlightChip('bs',bsVal);
  switchTab('memo');
  overlay.classList.add('open');
  setTimeout(()=>inputSJ.focus(),80);
}
function closeModal(){overlay.classList.remove('open');activeDay=activeY=activeM=null;}
function highlightChip(who,val){
  document.querySelectorAll(`.chip[data-who="${who}"]`).forEach(c=>c.classList.toggle('selected',c.dataset.val===val));
}

document.getElementById('chipsSJ').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;pendingSJ=c.dataset.val;highlightChip('sj',c.dataset.val);
});
document.getElementById('chipsBS').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;pendingBS=c.dataset.val;highlightChip('bs',c.dataset.val);
});

document.getElementById('btnCancel').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});

document.getElementById('btnSave').addEventListener('click',()=>{
  const sjTxt=inputSJ.value.trim(),bsTxt=inputBS.value.trim();
  const isMemo=document.getElementById('panelMemo').classList.contains('active');
  if(isMemo){
    if(!sjTxt&&!bsTxt){closeModal();return;}
    const memos=loadMemos(activeY,activeM);
    if(!memos[activeDay])memos[activeDay]={sj:[],bs:[]};
    if(!memos[activeDay].sj)memos[activeDay].sj=[];
    if(!memos[activeDay].bs)memos[activeDay].bs=[];
    if(sjTxt)memos[activeDay].sj.push(sjTxt);
    if(bsTxt)memos[activeDay].bs.push(bsTxt);
    saveMemos(activeY,activeM,memos);
  } else {
    const sched=loadSched(activeY,activeM);
    if(pendingSJ!=='__unchanged__'){
      if(pendingSJ===''||pendingSJ===undefined) delete sched.sj[activeDay];
      else sched.sj[activeDay]=pendingSJ;
    }
    if(pendingBS!=='__unchanged__'){
      if(pendingBS===''||pendingBS===undefined) delete sched.bs[activeDay];
      else if(pendingBS==='off')  sched.bs[activeDay]=null;
      else if(pendingBS==='오픈')  sched.bs[activeDay]={label:'오픈',time:'09:30~14:30'};
      else if(pendingBS==='오픈2') sched.bs[activeDay]={label:'오픈',time:'11:30~16:30'};
      else if(pendingBS==='미들')  sched.bs[activeDay]={label:'미들',time:'12:00~17:00'};
      else if(pendingBS==='마감')  sched.bs[activeDay]={label:'마감',time:'16:00~21:00'};
    }
    saveSched(activeY,activeM,sched);
  }
  buildCalendar(activeY,activeM);
  closeModal();
});

[inputSJ,inputBS].forEach(el=>{
  el.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btnSave').click();});
});

function attachEvents(y,m){
  document.getElementById('calendar').addEventListener('click',e=>{
    const del=e.target.closest('.memo-del');
    if(del){
      e.stopPropagation();
      const d=+del.dataset.day,who=del.dataset.who,i=+del.dataset.idx;
      const memos=loadMemos(y,m);
      memos[d][who].splice(i,1);
      if(!memos[d].sj.length&&!memos[d].bs.length)delete memos[d];
      saveMemos(y,m,memos);buildCalendar(y,m);return;
    }
    const cell=e.target.closest('.day-cell');
    if(cell&&!cell.classList.contains('empty'))openModal(y,m,+cell.dataset.day);
  });
}

document.getElementById('nextBtn').addEventListener('click',()=>{curMonth++;if(curMonth>12){curMonth=1;curYear++;}buildCalendar(curYear,curMonth);});

// Bin 하나에 스케줄·메모·채팅 모두 저장
const JBIN_KEY  = '$2a$10$drtvuupLQGyV7qDTXg09Ue3pMr.RSnYfsn0SKZpxyUvNtCA//q1ta';
const JBIN_BASE = 'https://api.jsonbin.io/v3/b';
const BIN_ID    = '6a3ce4a6da38895dfefc113a'; // 단일 Bin

async function readBin() {
  try {
    const r = await fetch(`${JBIN_BASE}/${BIN_ID}/latest`, {
      headers: {'X-Master-Key': JBIN_KEY}
    });
    const j = await r.json();
    return j.record || {};
  } catch { return {}; }
}

async function writeBin(data) {
  try {
    await fetch(`${JBIN_BASE}/${BIN_ID}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key':JBIN_KEY},
      body: JSON.stringify(data)
    });
  } catch(e) { console.warn('JSONBin write fail:', e); }
}

// 스케줄 클라우드 저장

// 앱 시작 시 클라우드 → 로컬 동기화
async function pullFromCloud(y, m) {
  const remote = await readBin();
  const rs = remote[`sched_${y}-${m}`];
  const rm = remote[`memo_${y}-${m}`];
  // 클라우드 스케줄이 실제 데이터를 가지고 있을 때만 덮어씀

  }
  if(rm) localStorage.setItem(memoKey(y,m), JSON.stringify(rm));
}

// ── 부탁의 말씀 (채팅) ────────────────────────────
let lastSeenCount = parseInt(localStorage.getItem('chat_seen_count')||'0');

// 푸시 알림 권한 요청
async function requestNotificationPermission() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

function sendPushNotification(who, text) {
  if(!('Notification' in window)) return;
  if(Notification.permission !== 'granted') return;
  new Notification(`📅 Schedule Viewer — ${who}`, {
    body: text,
    icon: '/favicon.ico',
    badge: '/favicon.ico',
    tag: 'schedule-chat', // 같은 tag면 중복 안 쌓임
  });
}

async function loadChatMessages() {
  const remote = await readBin();
  const todayKey = new Date().toISOString().slice(0,10);
  const allMsgs = remote?.messages || [];
  const msgs = allMsgs.filter(m => !m.date || m.date === todayKey);
  if(msgs.length > lastSeenCount) {
    const newMsgs = msgs.slice(lastSeenCount);
    newMsgs.forEach(m => sendPushNotification(m.who, m.text));
    lastSeenCount = msgs.length;
    localStorage.setItem('chat_seen_count', lastSeenCount);
    document.title = `(${newMsgs.length}) Schedule Viewer`;
    setTimeout(()=>{ document.title = 'Schedule Viewer'; }, 5000);
  }
  renderChat(msgs);
}

function renderChat(msgs) {
  const box = document.getElementById('chatMessages');
  if(!box) return;

  const todayKey = new Date().toISOString().slice(0,10);
  const [y,mo,d] = todayKey.split('-');
  const dateLabel = `${parseInt(mo)}월 ${parseInt(d)}일`;

  if(msgs.length === 0) {
    box.innerHTML = `
      <div class="chat-date-divider">${dateLabel}</div>
      <div class="chat-empty">오늘의 부탁 메시지가 없어요 🙏</div>`;
    return;
  }
  box.innerHTML = `<div class="chat-date-divider">${dateLabel}</div>` +
    msgs.map((m,i) => `
    <div class="chat-msg ${m.who==='지호'?'msg-sj':'msg-bs'}">
      <div class="chat-who">${m.who}</div>
      <div class="chat-bubble">
        <span class="bubble-text">${m.text}</span>
        <span class="bubble-time">${m.time}</span>
      </div>
      <span class="chat-del" data-idx="${i}">✕</span>
    </div>
  `).join('');
  box.scrollTop = box.scrollHeight;

  box.querySelectorAll('.chat-del').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const remote = await readBin();
      const todayKey2 = new Date().toISOString().slice(0,10);
      const allMsgs = remote?.messages || [];
      const todayMsgs = allMsgs.filter(m => !m.date || m.date === todayKey2);
      const target = todayMsgs[+btn.dataset.idx];
      const newAll = allMsgs.filter(m => m !== target);
      lastSeenCount = Math.max(0, lastSeenCount - 1);
      localStorage.setItem('chat_seen_count', lastSeenCount);
      remote.messages = newAll;
      await writeBin(remote);
      renderChat(newAll.filter(m => !m.date || m.date === todayKey2));
    });
  });
}

async function sendChatMessage(who, text) {
  if(!text.trim()) return;
  const remote = await readBin();
  if(!remote.messages) remote.messages = [];
  const todayKey = new Date().toISOString().slice(0,10);
  remote.messages = remote.messages.filter(m => m.date === todayKey);
  const now2 = new Date();
  const time = `${String(now2.getHours()).padStart(2,'0')}:${String(now2.getMinutes()).padStart(2,'0')}`;
  remote.messages.push({who, text: text.trim(), time, date: todayKey});
  lastSeenCount = remote.messages.length;
  localStorage.setItem('chat_seen_count', lastSeenCount);
  await writeBin(remote);
  renderChat(remote.messages);
}

(async ()=>{
  await requestNotificationPermission();
  // 스케줄은 항상 기본 데이터 우선 표시 (클라우드 pull 제거)
  buildCalendar(curYear, curMonth);

  document.getElementById('chatSendSJ').addEventListener('click', async ()=>{
    const inp = document.getElementById('chatInputSJ');

    inp.value = '';
  });
  document.getElementById('chatSendBS').addEventListener('click', async ()=>{
    const inp = document.getElementById('chatInputBS');
    await sendChatMessage('새은', inp.value);
    inp.value = '';
  });
  document.getElementById('chatRefresh').addEventListener('click', async ()=>{
    const btn = document.getElementById('chatRefresh');
    btn.style.transition = 'transform .3s';
    btn.style.transform = 'rotate(360deg)';
    await loadChatMessages();
    setTimeout(()=>{ btn.style.transform=''; }, 350);
  });
  ['chatInputSJ','chatInputBS'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown', async e=>{
      if(e.key==='Enter'){
        const who = id==='chatInputSJ'?'지호':'새은';
        await sendChatMessage(who, e.target.value);
        e.target.value='';
      }
    });
  });
})();
</script>
